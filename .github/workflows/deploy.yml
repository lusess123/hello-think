name: Deploy Cloudflare Worker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hello-think-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, build and deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=dot

      - name: Build
        run: npm run build

      - name: Prepare Worker secrets
        env:
          GITHUB_CLIENT_ID: ${{ secrets.APP_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.APP_GITHUB_CLIENT_SECRET }}
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
          STORY_GITHUB_PRIVATE_KEY: ${{ secrets.STORY_GITHUB_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const { writeFileSync } = require("node:fs");
          const names = [
            "GITHUB_CLIENT_ID",
            "GITHUB_CLIENT_SECRET",
            "AI_GATEWAY_BASE_URL",
            "AI_GATEWAY_TOKEN",
            "STORY_GITHUB_PRIVATE_KEY"
          ];
          const missing = names.filter((name) => !process.env[name]);
          if (missing.length > 0) {
            throw new Error(`Missing GitHub Actions secrets: ${missing.join(", ")}`);
          }
          writeFileSync(
            ".deploy-secrets.json",
            JSON.stringify(Object.fromEntries(names.map((name) => [name, process.env[name]]))),
            { mode: 0o600 }
          );
          NODE

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --secrets-file .deploy-secrets.json

      - name: Remove temporary secrets file
        if: always()
        run: rm -f .deploy-secrets.json
